site_name: CS Fundamentals
site_description: Фундаментальные основы Computer Science
site_author: Daniil Gavrin
repo_url: https://github.com/DaniilGavrin/cs-fundamentals
repo_name: DaniilGavrin/cs-fundamentals

theme:
  name: material
  language: ru
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Переключить на темную тему
      primary: indigo
      accent: indigo
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Переключить на светлую тему
      primary: indigo
      accent: indigo

nav:
  - Главная: index.md
  - Дискретная математика: discrete-math.md
  - Архитектура ЭВМ: computer-architecture.md
  - Структуры данных: data-structures.md
  - Алгоритмы: algorithms.md

markdown_extensions:
  - admonition
  - codehilite:
      linenums: true
  - toc:
      permalink: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details

plugins:
  - search
