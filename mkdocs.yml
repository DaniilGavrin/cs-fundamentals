site_name: CS Fundamentals
site_description: Фундаментальные основы Computer Science
site_author: DaniilGavrin
repo_url: https://github.com/DaniilGavrin/cs-fundamentals
repo_name: DaniilGavrin/cs-fundamentals

theme:
  name: material
  language: ru
  palette:
    primary: blue
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - search.suggest
    - search.highlight

nav:
  - Главная: index.md
  - Дискретная математика: discrete-math.md
  - Архитектура ЭВМ: computer-architecture.md
  - Структуры данных: data-structures.md
  - Алгоритмы: algorithms.md

markdown_extensions:
  - admonition
  - codehilite:
      linenums: true
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
