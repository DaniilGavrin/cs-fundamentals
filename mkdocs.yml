site_name: CS Fundamentals
site_description: Фундаментальные основы Computer Science: алгоритмы, структуры данных, архитектура ЭВМ и математика
site_author: DaniilGavrin
repo_url: https://github.com/DaniilGavrin/cs-fundamentals
repo_name: DaniilGavrin/cs-fundamentals

theme:
  name: material
  language: ru
  palette:
    primary: teal
    accent: deep orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - search.suggest
    - search.highlight

nav:
  - Главная: index.md
  - Алгоритмы: algorithms.md
  - Структуры данных: data-structures.md
  - Архитектура ЭВМ: computer-architecture.md
  - Дискретная математика: discrete-math.md

markdown_extensions:
  - admonition
  - codehilite
  - tables
  - footnotes
  - toc:
      permalink: true
